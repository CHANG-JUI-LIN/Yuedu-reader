name: Localization

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "iOS/**/*.strings"
      - "scripts/check_localizations.rb"
      - ".github/workflows/localization.yml"
  push:
    branches:
      - main
    paths:
      - "iOS/**/*.strings"
      - "scripts/check_localizations.rb"
      - ".github/workflows/localization.yml"

jobs:
  localization:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Checkout repository without token
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "refs/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune --depth=1 origin "$GITHUB_REF"
          fi
          git checkout --force FETCH_HEAD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check localization files
        run: scripts/check_localizations.rb
