name: Reader CoreText Gates

on:
  workflow_dispatch:
  pull_request:

jobs:
  reader-coretext:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository without token
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "refs/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune --depth=1 origin "$GITHUB_REF"
          fi
          git checkout --force FETCH_HEAD
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Whitespace check
        run: git diff --check

      - name: Localization plist lint
        run: find iOS -name Localizable.strings -print0 | xargs -0 plutil -lint

      - name: Build app
        run: |
          xcodebuild build \
            -project Yuedu-Reader.xcodeproj \
            -scheme Yuedu-Reader \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -configuration Debug

      - name: Focused reader tests
        run: |
          xcodebuild test \
            -project Yuedu-Reader.xcodeproj \
            -scheme Yuedu-Reader \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -only-testing:"yuedu appTests/ReaderPresentationContractTests" \
            -only-testing:"yuedu appTests/ReaderEngineContractTests" \
            -only-testing:"yuedu appTests/ProgrammaticPageTransitionPerformerTests" \
            -only-testing:"yuedu appTests/ReaderPageTransitionQueueTests" \
            -only-testing:"yuedu appTests/CoreTextCFIProgressTests"
