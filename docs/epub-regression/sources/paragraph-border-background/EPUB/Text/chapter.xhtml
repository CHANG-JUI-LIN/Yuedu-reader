<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Bordered Paragraph</title>
    <link rel="stylesheet" type="text/css" href="../Styles/style.css"/>
  </head>
  <body>
    <h1>Bordered Paragraph</h1>
    <p class="boxed">This paragraph has margin, padding, border, and background. The visual box should stay attached to the text flow and should not drift away from the paragraph.</p>
    <p>The next paragraph should start below the decorated box.</p>
  </body>
</html>
